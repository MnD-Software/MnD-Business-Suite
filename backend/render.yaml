# MnD Business Suite - Render Configuration
# Optimized for Render's cloud hosting platform
# Compatible with Render's deployment pipelines

services:
  - type: web
    name: mnd-backend
    rootDir: backend
    runtime: python
    pythonVersion: "3.12"
    
    # Build configuration
    buildCommand: pip install -r requirements.txt
    
    # Start command using PORT environment variable (Render requirement)
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers ${WEB_CONCURRENCY:-2}
    
    # Health check for Render's load balancer
    healthCheckPath: /health
    healthCheckInterval: 30
    healthCheckTimeout: 10
    healthCheckRetries: 3
    
    # Auto-scaling configuration
    autoscaling:
      minInstances: 1
      maxInstances: 3
      targetCPUPercent: 70
    
    # Instance configuration
    instanceType: standard
    instanceCount: 1
    
    env:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12"
      - key: LOG_LEVEL
        value: "INFO"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: API_V1_PREFIX
        value: "/api/v1"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ISSUER
        value: "mnd-business-suite"
      - key: JWT_AUDIENCE
        value: "mnd-users"
      - key: JWT_ACCESS_TOKEN_EXPIRES_MINUTES
        value: "15"
      - key: JWT_REFRESH_TOKEN_EXPIRES_DAYS
        value: "14"
      - key: PASSWORD_BCRYPT_ROUNDS
        value: "12"
      - key: RATE_LIMIT_DEFAULT
        value: "100/minute"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: "none"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: FX_API_KEY
        sync: false
